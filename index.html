<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUROBEAT MASTER</title>
<style>
@font-face {
  font-family: "seb";
  src: url("super-eurobeat.otf") format("opentype");
}
  body{
background:black;
margin:0;
}
.navbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#000000;
  padding:10px 16px;
  box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

/* 左 */
.nav-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.menu-btn{
  font-size:10px;
  cursor:pointer;
color:white;
}

.logo{
  font-family:"seb";
  font-size:18px;
  color:#ffffff;
}

/* 中央 */
.nav-center{
  flex:1;
  display:flex;
  justify-content:center;
}

.search-box{
  width:50%;
  display:flex;
}

.search-box input{
  flex:1;
color:white;
background:rgb(9, 9, 9);
  padding:8px;
  border:1px solid #3d3d3d;
  border-right:none;
  border-radius:4px 0 0 4px;
}

.search-box button{
  padding:0px 20px 0px 20px;
  border:1px solid #3d3d3d;
  background:#242424;
  cursor:pointer;
  border-radius:0 4px 4px 0;
}

/* 右 */
.nav-right{
  display:flex;
  gap:16px;
  font-size:18px;
  cursor:pointer;
}

.icon:hover{
  opacity:0.7;
}
</style>
</head>
<body>
<div class="navbar">

  <div class="nav-left">
    
    <div class="logo">EUROBEAT MASTER</div>
  </div>

  <div class="nav-center">
    <div class="search-box">
      <input type="text" placeholder="検索">
      <button><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-search" viewBox="0 0 16 16">
  <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
</svg></button>
    </div>
  </div>

  <div class="nav-right">
    <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-file-earmark-arrow-up-fill" viewBox="0 0 16 16">
  <path d="M9.293 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.707A1 1 0 0 0 13.707 4L10 .293A1 1 0 0 0 9.293 0M9.5 3.5v-2l3 3h-2a1 1 0 0 1-1-1M6.354 9.854a.5.5 0 0 1-.708-.708l2-2a.5.5 0 0 1 .708 0l2 2a.5.5 0 0 1-.708.708L8.5 8.707V12.5a.5.5 0 0 1-1 0V8.707z"/>
</svg></div>

  </div>

</div>
</body>
</html>
